name: Build Branch Docker Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: true
        default: true
        type: boolean
      image_suffix:
        description: "Optional image name suffix (e.g. test)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-branch-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          suffix="${{ github.event.inputs.image_suffix }}"
          if [ -n "$suffix" ]; then
            echo "name=${{ env.REGISTRY }}/${{ github.repository_owner }}/litellm-$suffix" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.REGISTRY }}/${{ github.repository_owner }}/litellm" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: ${{ github.event.inputs.push_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image tags
        run: |
          echo "Built tags:"
          echo "${{ steps.meta.outputs.tags }}"
